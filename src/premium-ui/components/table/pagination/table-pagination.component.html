<div class="pui-table-pagination" role="navigation" aria-label="Table pagination">
  <p class="pui-table-pagination__meta">
    Showing {{ rangeStart() }}–{{ rangeEnd() }} of {{ totalRows() }} rows
  </p>

  <div class="pui-table-pagination__controls">
    <label class="pui-table-pagination__size">
      <span>Rows</span>
      <select [value]="pageSize()" (change)="onPageSizeChange($event)" aria-label="Rows per page">
        @for (size of pageSizeOptions(); track size) {
          <option [value]="size">{{ size }}</option>
        }
      </select>
    </label>

    <div class="pui-table-pagination__nav">
      <button
        type="button"
        class="pui-table-pagination__button"
        [disabled]="pageIndex() <= 0"
        aria-label="Previous page"
        (click)="goPrevious()"
      >
        ‹
      </button>
      <span class="pui-table-pagination__page">{{ pageIndex() + 1 }} / {{ pageCount() }}</span>
      <button
        type="button"
        class="pui-table-pagination__button"
        [disabled]="pageIndex() >= pageCount() - 1"
        aria-label="Next page"
        (click)="goNext()"
      >
        ›
      </button>
    </div>
  </div>
</div>
