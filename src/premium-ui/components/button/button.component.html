<button
  class="pui-button__control"
  [attr.type]="type()"
  [disabled]="isDisabled()"
  [attr.aria-busy]="loading() ? 'true' : null"
  [attr.aria-label]="ariaLabel() || null"
  (click)="handleClick($event)"
>
  @if (loading()) {
    <span class="pui-button__spinner" aria-hidden="true"></span>
  }
  <span class="pui-button__icon" aria-hidden="true">
    <ng-content select="[puiButtonIcon]"></ng-content>
  </span>
  <span class="pui-button__label">
    <ng-content></ng-content>
  </span>
</button>
