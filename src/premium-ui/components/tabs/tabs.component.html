<div class="pui-tabs__nav">
  <div
    class="pui-tabs__list"
    role="tablist"
    [attr.aria-label]="ariaLabel()"
    [attr.aria-orientation]="orientation()"
  >
    @if (showIndicator()) {
      <span class="pui-tabs__indicator" aria-hidden="true"></span>
    }
    <ng-content select="pui-tab-item" />
  </div>
</div>

<div class="pui-tabs__content">
  <ng-content select="pui-tab-panel" />
</div>
