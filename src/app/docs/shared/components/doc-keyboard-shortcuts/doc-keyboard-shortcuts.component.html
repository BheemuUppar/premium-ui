@if (title()) {
  <h3 class="pui-doc-keyboard-table__title">{{ title() }}</h3>
}

<div class="pui-doc-keyboard-table__wrap">
  <table class="pui-doc-keyboard-table__table">
    <thead>
      <tr>
        <th scope="col">Key</th>
        <th scope="col">Action</th>
      </tr>
    </thead>
    <tbody>
      @for (shortcut of shortcuts(); track shortcut.description) {
        <tr>
          <td>
            <div class="pui-doc-keyboard-table__keys">
              @for (key of shortcut.keys; track key; let last = $last) {
                <kbd>{{ key }}</kbd>
                @if (!last) {
                  <span class="pui-doc-keyboard-table__plus" aria-hidden="true">+</span>
                }
              }
            </div>
          </td>
          <td class="pui-doc-keyboard-table__action">{{ shortcut.description }}</td>
        </tr>
      }
    </tbody>
  </table>
</div>
