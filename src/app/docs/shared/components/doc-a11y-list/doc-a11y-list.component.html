<ul class="pui-doc-a11y-list">
  @for (item of items(); track item.title) {
    <li class="pui-doc-a11y-list__item">
      <div class="pui-doc-a11y-list__header">
        <h4>{{ item.title }}</h4>
        @if (item.code) {
          <code>{{ item.code }}</code>
        }
      </div>
      <p>{{ item.description }}</p>
    </li>
  }
</ul>
