@if (title()) {
  <h3 class="pui-doc-a11y-table__title">{{ title() }}</h3>
}

<div class="pui-doc-a11y-table__wrap">
  <table class="pui-doc-a11y-table__table">
    <thead>
      <tr>
        <th scope="col">Requirement</th>
        <th scope="col">Implementation</th>
      </tr>
    </thead>
    <tbody>
      @for (item of items(); track item.title) {
        <tr>
          <td class="pui-doc-a11y-table__topic">{{ item.title }}</td>
          <td>
            @if (item.code) {
              <code class="pui-doc-a11y-table__code">{{ item.code }}</code>
            }
            <span class="pui-doc-a11y-table__detail">{{ item.description }}</span>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
