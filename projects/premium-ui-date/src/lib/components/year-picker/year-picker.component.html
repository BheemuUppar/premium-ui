<div class="pui-year-picker__header">
  <button type="button" (click)="shiftPage(-1)" aria-label="Previous years">‹</button>
  <span>{{ years()[0] }} – {{ years()[years().length - 1] }}</span>
  <button type="button" (click)="shiftPage(1)" aria-label="Next years">›</button>
</div>
<div class="pui-year-picker__grid" role="listbox" aria-label="Choose year">
  @for (year of years(); track year) {
    <button
      type="button"
      class="pui-year-picker__cell"
      role="option"
      [class.pui-year-picker__cell--selected]="value() === year"
      [disabled]="disabled()"
      [attr.aria-selected]="value() === year"
      (click)="selectYear(year)"
    >
      {{ year }}
    </button>
  }
</div>
